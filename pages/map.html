<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Floor Map</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script defer src="../js/script.js"></script>
</head>
<body>
  <main class="page-shell">
    <header class="page-header">
      <h1>Floor Map</h1>
      <p id="selectedRoomText">Select a room to show its location</p>
    </header>

    <section class="container map-container">
      <div class="floor-tabs">
        <button class="tab active" data-floor="ground" type="button">Ground Floor</button>
        <button class="tab" data-floor="first" type="button">First Floor</button>
        <button class="tab" data-floor="second" type="button">Second Floor</button>
      </div>

      <div class="map-wrapper">
        <img id="groundMap" class="floor-map active-map" src="../assets/ground-floor.png" alt="Ground floor map" />
        <img id="firstMap" class="floor-map" src="../assets/first-floor.png" alt="First floor map" />
        <img id="secondMap" class="floor-map" src="../assets/second-floor.png" alt="Second floor map" />
        <div id="marker" class="marker" aria-hidden="true"></div>
      </div>

      <a href="../index.html" class="button back-link">← Back to Home</a>
    </section>
  </main>
</body>
</html>
